<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitki Hastalığı Teşhis Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #10b981;
            --primary-hover: #059669;
            --primary-glow: rgba(16, 185, 129, 0.2);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 40%);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Controls Section */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media(min-width: 600px) {
            .controls-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
        }

        .control-group label span {
            color: var(--primary);
            font-weight: 600;
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
        }

        /* Dropzone area */
        .dropzone {
            border: 2px dashed rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            background: rgba(16, 185, 129, 0.01);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .dropzone:hover {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.03);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .dropzone svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .dropzone p {
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .dropzone span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        #file-input {
            display: none;
        }

        /* Preview screen */
        .preview-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .preview-image-wrapper {
            position: relative;
            max-width: 100%;
            max-height: 300px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .preview-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Result output */
        .result-container {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert {
            padding: 1rem 1.25rem;
            border-radius: 14px;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            font-size: 0.95rem;
            border: 1px solid transparent;
        }

        .alert-warning {
            background: var(--warning-glow);
            border-color: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .alert-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .predictions-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .prediction-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--primary) 0%, #3b82f6 100%);
        }

        .loader {
            display: none;
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bitki Hastalığı Teşhis Paneli</h1>
        <p>EfficientNet-B2 Modeli REST API Arayüzü</p>
    </header>

    <div class="card">
        <!-- Controls -->
        <div class="controls-grid">
            <div class="control-group">
                <label for="threshold-slider">Güven Eşiği (Threshold): <span id="threshold-val">25%</span></label>
                <input type="range" id="threshold-slider" class="slider" min="0" max="100" value="25">
            </div>
            <div class="control-group" style="justify-content: flex-end; align-items: flex-end;">
                <span id="api-status" style="color: var(--primary); font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem;">
                    ● Sunucu Aktif
                </span>
            </div>
        </div>

        <!-- Upload Form -->
        <div id="upload-view">
            <div class="dropzone" id="dropzone">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                </svg>
                <p>Resmi sürükleyip bırakın veya seçmek için tıklayın</p>
                <span>PNG, JPEG veya JPG formatında bitki yaprağı görseli</span>
            </div>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <!-- Preview & Run -->
        <div id="preview-view" class="preview-container">
            <div class="preview-image-wrapper">
                <img id="image-preview" src="#" alt="Görsel önizleme">
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" id="btn-cancel">İptal</button>
                <button class="btn btn-primary" id="btn-predict">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 20px; height: 20px;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l8.904-4.43c2.402-1.198 3.904-3.662 3.904-6.42 0-4.175-3.8-7.5-8.5-7.5S4.82 5.998 4.82 10.077c0 2.274 1.155 4.312 2.966 5.679L9.813 15.904z" />
                    </svg>
                    Teşhis Et
                </button>
            </div>
        </div>

        <!-- Loading spinner -->
        <div class="loader" id="loader"></div>

        <!-- Results Card -->
        <div id="result-view" class="result-container">
            <div id="result-alert"></div>
            
            <h3>Tahmin Detayları (En Yüksek 5 Olasılık)</h3>
            <div class="predictions-list" id="predictions-list"></div>
        </div>
    </div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const uploadView = document.getElementById('upload-view');
    const previewView = document.getElementById('preview-view');
    const imagePreview = document.getElementById('image-preview');
    const btnCancel = document.getElementById('btn-cancel');
    const btnPredict = document.getElementById('btn-predict');
    const loader = document.getElementById('loader');
    const resultView = document.getElementById('result-view');
    const resultAlert = document.getElementById('result-alert');
    const predictionsList = document.getElementById('predictions-list');
    
    const slider = document.getElementById('threshold-slider');
    const thresholdVal = document.getElementById('threshold-val');

    let selectedFile = null;

    // Slider Event
    slider.addEventListener('input', (e) => {
        thresholdVal.textContent = e.target.value + '%';
    });

    // Dropzone Events
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.style.borderColor = 'var(--primary)';
        dropzone.style.background = 'rgba(16, 185, 129, 0.05)';
    });
    dropzone.addEventListener('dragleave', () => {
        dropzone.style.borderColor = 'rgba(16, 185, 129, 0.3)';
        dropzone.style.background = 'rgba(16, 185, 129, 0.01)';
    });
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFile(e.target.files[0]);
        }
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) {
            alert('Lütfen geçerli bir resim dosyası seçin.');
            return;
        }
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            imagePreview.src = e.target.result;
            uploadView.style.display = 'none';
            previewView.style.display = 'flex';
            resultView.style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    btnCancel.addEventListener('click', () => {
        selectedFile = null;
        fileInput.value = '';
        uploadView.style.display = 'block';
        previewView.style.display = 'none';
        resultView.style.display = 'none';
    });

    btnPredict.addEventListener('click', async () => {
        if (!selectedFile) return;

        loader.style.display = 'block';
        resultView.style.display = 'none';
        btnPredict.disabled = true;

        const formData = new FormData();
        formData.append('file', selectedFile);

        const thresholdDecimal = parseFloat(slider.value) / 100.0;
        
        try {
            const response = await fetch(`/predict?threshold=${thresholdDecimal}`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error('API isteği başarısız oldu.');
            }

            const data = await response.json();
            displayResults(data);
        } catch (error) {
            alert('Tahmin yapılırken hata oluştu: ' + error.message);
        } finally {
            loader.style.display = 'none';
            btnPredict.disabled = false;
        }
    });

    function displayResults(data) {
        resultView.style.display = 'block';
        predictionsList.innerHTML = '';
        
        // Alert box
        if (data.is_confident) {
            resultAlert.className = 'alert alert-success';
            resultAlert.innerHTML = `
                <div class="alert-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 20px; height: 20px;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Güvenli Teşhis
                </div>
                <div>Model tahmini yüksek güvenilirlikle gerçekleşti: <strong>${data.prediction}</strong> (${(data.confidence * 100).toFixed(2)}%)</div>
            `;
        } else {
            resultAlert.className = 'alert alert-warning';
            resultAlert.innerHTML = `
                <div class="alert-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 20px; height: 20px;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                    </svg>
                    Düşük Güven Seviyesi (Eşik Altı)
                </div>
                <div>${data.warning}</div>
            `;
        }

        // List predictions
        data.all_predictions.forEach(pred => {
            const pct = (pred.confidence * 100).toFixed(2);
            const item = document.createElement('div');
            item.className = 'prediction-item';
            item.innerHTML = `
                <div class="prediction-header">
                    <span>${pred.class_name}</span>
                    <span>%${pct}</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" style="width: ${pct}%"></div>
                </div>
            `;
            predictionsList.appendChild(item);
        });
        
        resultView.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
